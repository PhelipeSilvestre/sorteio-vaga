<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Vagas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>Sorteio de Vagas</h1>

        <div class="card">
            <h2>Cadastrar Participante</h2>
            <input type="text" id="nomeInput" placeholder="Nome do participante">
            <button id="addBtn">Adicionar</button>
        </div>

        <div class="card">
            <h2>Lista de Participantes</h2>
            <ul id="listaParticipantes"></ul>
        </div>

        <div class="card">
            <h2>Sorteio</h2>
            <button id="sortearBtn">Sortear</button>
            <p id="resultado"></p>
        </div>
    </div>

<script src="js/storage.js"></script>
<script src="js/participantes.js"></script>
<script src="js/sorteio.js"></script>
<script src="js/app.js"></script>
</body>
</html>
